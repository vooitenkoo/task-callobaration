spring.application.name=task-collaboration
spring.datasource.url=jdbc:postgresql://localhost:5432/task_platform
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
server.port=8084
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.flyway.enabled=true
spring.flyway.locations=classpath:templates/db/migration
spring.flyway.baseline-on-migrate=true
# MinIO configuration
minio.url=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket-name=avatars


spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

logging.level.org.springdoc=DEBUG
logging.level.org.springframework.web=DEBUG

jwt.secret=X7kP9mQ2vL5jR8yT3uW6xZ4nB1cE0fH8A9sD0gJ1kL2mN3pQ
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# Actuator configuration
management.endpoints.web.exposure.include=health,info,flyway
management.endpoint.health.show-details=always